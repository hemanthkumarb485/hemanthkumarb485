<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#00f7ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#00f7ff"/>
      <stop offset="70%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>

    <!-- Orb gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f7ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00f7ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </radialGradient>

    <!-- Glow filter for shield -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow filter for text -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">

    <!-- Background -->
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- Grid lines -->
    <g opacity="0.06" stroke="#00f7ff" stroke-width="0.5">
      <line x1="0" y1="40" x2="900" y2="40"/>
      <line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="40" y1="0" x2="40" y2="280"/>
      <line x1="80" y1="0" x2="80" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="160" y1="0" x2="160" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="240" y1="0" x2="240" y2="280"/>
      <line x1="280" y1="0" x2="280" y2="280"/>
      <line x1="320" y1="0" x2="320" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <line x1="400" y1="0" x2="400" y2="280"/>
      <line x1="440" y1="0" x2="440" y2="280"/>
      <line x1="480" y1="0" x2="480" y2="280"/>
      <line x1="520" y1="0" x2="520" y2="280"/>
      <line x1="560" y1="0" x2="560" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="640" y1="0" x2="640" y2="280"/>
      <line x1="680" y1="0" x2="680" y2="280"/>
      <line x1="720" y1="0" x2="720" y2="280"/>
      <line x1="760" y1="0" x2="760" y2="280"/>
      <line x1="800" y1="0" x2="800" y2="280"/>
      <line x1="840" y1="0" x2="840" y2="280"/>
      <line x1="880" y1="0" x2="880" y2="280"/>
    </g>

    <!-- Glowing orbs with pulse animation -->
    <ellipse cx="-20" cy="-20" rx="180" ry="180" fill="url(#orb1)">
      <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="180;220;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="820" cy="320" rx="160" ry="160" fill="url(#orb2)">
      <animate attributeName="rx" values="160;200;160" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="160;200;160" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="650" cy="80" rx="110" ry="110" fill="url(#orb3)">
      <animate attributeName="rx" values="110;140;110" dur="5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="110;140;110" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Corner brackets -->
    <g stroke="#00f7ff" stroke-width="2" fill="none" opacity="0.5">
      <!-- Top left -->
      <polyline points="12,32 12,12 32,12"/>
      <!-- Top right -->
      <polyline points="868,12 888,12 888,32"/>
      <!-- Bottom left -->
      <polyline points="12,248 12,268 32,268"/>
      <!-- Bottom right -->
      <polyline points="868,268 888,268 888,248"/>
    </g>

    <!-- ===== SHIELD ICON ===== -->
    <g transform="translate(50, 100)" filter="url(#glow)">
      <!-- Outer shield -->
      <path d="M40 2L4 16V38C4 56 19 72 40 78C61 72 76 56 76 38V16L40 2Z"
            fill="rgba(0,247,255,0.08)" stroke="#00f7ff" stroke-width="1.5"/>
      <!-- Inner shield -->
      <path d="M40 12L12 24V39C12 53 24 66 40 70C56 66 68 53 68 39V24L40 12Z"
            fill="rgba(0,247,255,0.04)" stroke="rgba(0,247,255,0.3)" stroke-width="1"/>
      <!-- Lock circle -->
      <circle cx="40" cy="42" r="10" fill="rgba(0,247,255,0.15)" stroke="#00f7ff" stroke-width="1.5">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Lock body -->
      <rect x="36" y="41" width="8" height="9" rx="1" fill="#00f7ff" opacity="0.9"/>
      <!-- Lock shackle -->
      <path d="M35 41V37C35 33.7 37.3 31 40 31C42.7 31 45 33.7 45 37V41"
            stroke="#00f7ff" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Shield glow animation -->
      <path d="M40 2L4 16V38C4 56 19 72 40 78C61 72 76 56 76 38V16L40 2Z"
            fill="none" stroke="#00f7ff" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width" values="1.5;4;1.5" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- ACTIVE dot -->
    <circle cx="75" cy="198" r="4" fill="#00f7ff">
      <animate attributeName="opacity" values="1;0.1;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="84" y="202" font-family="Courier New" font-size="10" fill="#00f7ff" letter-spacing="1">ACTIVE</text>

    <!-- ===== MAIN CONTENT ===== -->

    <!-- Tagline -->
    <text x="160" y="100" font-family="Courier New" font-size="11" fill="#00f7ff"
          letter-spacing="3" opacity="0.8">// CYBERSECURITY · WEB DEV · CTF</text>

    <!-- Name with gradient -->
    <text x="158" y="158" font-family="Arial Black, sans-serif" font-size="54" font-weight="900"
          fill="url(#nameGrad)" filter="url(#textGlow)" letter-spacing="-1">Hemanth Kumar B</text>

    <!-- Role pills -->
    <!-- Pill 1: Web Security -->
    <rect x="160" y="170" width="110" height="22" rx="11"
          fill="rgba(0,247,255,0.1)" stroke="rgba(0,247,255,0.4)" stroke-width="1"/>
    <text x="175" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="600"
          fill="#00f7ff">🔐 Web Security</text>

    <!-- Pill 2: CTF Hunter -->
    <rect x="278" y="170" width="100" height="22" rx="11"
          fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
    <text x="292" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="600"
          fill="#a78bfa">🏁 CTF Hunter</text>

    <!-- Pill 3: Dev -->
    <rect x="386" y="170" width="60" height="22" rx="11"
          fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
    <text x="400" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="600"
          fill="#60a5fa">💻 Dev</text>

    <!-- Stats row -->
    <!-- Stat 1: Podiums -->
    <text x="178" y="222" font-family="Arial Black" font-size="22" font-weight="800"
          fill="#00f7ff" text-anchor="middle">6+</text>
    <text x="178" y="235" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)"
          letter-spacing="1" text-anchor="middle">PODIUMS</text>

    <!-- Divider -->
    <line x1="215" y1="210" x2="215" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Stat 2: Gold -->
    <text x="250" y="222" font-family="Arial Black" font-size="22" font-weight="800"
          fill="#00f7ff" text-anchor="middle">2×</text>
    <text x="250" y="235" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)"
          letter-spacing="1" text-anchor="middle">🥇 GOLD</text>

    <!-- Divider -->
    <line x1="285" y1="210" x2="285" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Stat 3: Internships -->
    <text x="325" y="222" font-family="Arial Black" font-size="22" font-weight="800"
          fill="#00f7ff" text-anchor="middle">3+</text>
    <text x="325" y="235" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)"
          letter-spacing="1" text-anchor="middle">INTERNSHIPS</text>

    <!-- Divider -->
    <line x1="365" y1="210" x2="365" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Stat 4: CSE -->
    <text x="400" y="222" font-family="Arial Black" font-size="22" font-weight="800"
          fill="#00f7ff" text-anchor="middle">CSE</text>
    <text x="400" y="235" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)"
          letter-spacing="1" text-anchor="middle">CYBER SEC</text>

    <!-- ===== TERMINAL CARD ===== -->
    <rect x="670" y="50" width="210" height="180" rx="8"
          fill="rgba(0,0,0,0.55)" stroke="rgba(0,247,255,0.25)" stroke-width="1"/>

    <!-- Terminal header -->
    <rect x="670" y="50" width="210" height="28" rx="8"
          fill="rgba(0,247,255,0.08)"/>
    <rect x="670" y="65" width="210" height="13" fill="rgba(0,247,255,0.08)"/>
    <line x1="670" y1="78" x2="880" y2="78" stroke="rgba(0,247,255,0.15)" stroke-width="1"/>

    <!-- Terminal dots -->
    <circle cx="685" cy="64" r="5" fill="#ff5f57"/>
    <circle cx="700" cy="64" r="5" fill="#febc2e"/>
    <circle cx="715" cy="64" r="5" fill="#28c840"/>
    <text x="728" y="68" font-family="Courier New" font-size="9" fill="rgba(255,255,255,0.35)"
          letter-spacing="1">terminal</text>

    <!-- Terminal content -->
    <text x="682" y="100" font-family="Courier New" font-size="10" fill="#00f7ff">$ </text>
    <text x="696" y="100" font-family="Courier New" font-size="10" fill="#ffffff">nmap -sV target</text>

    <text x="682" y="116" font-family="Courier New" font-size="9" fill="rgba(255,255,255,0.45)">Scanning...</text>

    <text x="682" y="132" font-family="Courier New" font-size="10" fill="#28c840">PORT 443 OPEN ✓</text>

    <text x="682" y="152" font-family="Courier New" font-size="10" fill="#00f7ff">$ </text>
    <text x="696" y="152" font-family="Courier New" font-size="10" fill="#ffffff">whoami</text>

    <text x="682" y="168" font-family="Courier New" font-size="10" fill="#a78bfa">N1ghtM4r3d4rk</text>

    <text x="682" y="188" font-family="Courier New" font-size="10" fill="#00f7ff">$ </text>
    <text x="696" y="188" font-family="Courier New" font-size="10" fill="#ffffff">cat flag.txt</text>

    <text x="682" y="204" font-family="Courier New" font-size="10" fill="#28c840">flag{h3m4nth_w1ns}</text>

    <!-- Blinking cursor -->
    <rect x="682" y="214" width="7" height="11" fill="#00f7ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating particles -->
    <circle cx="200" cy="280" r="2" fill="#00f7ff" opacity="0">
      <animate attributeName="cy" values="280;-10" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.3;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="280" r="2" fill="#a78bfa" opacity="0">
      <animate attributeName="cy" values="280;-10" dur="8s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.3;0" dur="8s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="280" r="2" fill="#00f7ff" opacity="0">
      <animate attributeName="cy" values="280;-10" dur="5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.3;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="280" r="2" fill="#a78bfa" opacity="0">
      <animate attributeName="cy" values="280;-10" dur="7s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.3;0" dur="7s" begin="0.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom accent line -->
    <rect x="0" y="277" width="900" height="3" fill="url(#accentLine)"/>

  </g>
</svg>
