    <line x1="375" y1="210" x2="375" y2="242" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <text x="410" y="222" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#00f7ff" text-anchor="middle">CSE</text>
    <text x="410" y="236" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.38)" letter-spacing="1.2" text-anchor="middle">CYBER SEC</text>

