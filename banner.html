<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hemanth Kumar B — Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    .banner-wrap {
      width: 900px;
      max-width: 100%;
    }
    svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="banner-wrap">
    <svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#0d0a00"/>
          <stop offset="40%" stop-color="#120d02"/>
          <stop offset="100%" stop-color="#0d0a00"/>
        </linearGradient>
        <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="45%" stop-color="#ffb300"/>
          <stop offset="100%" stop-color="#ff6a00"/>
        </linearGradient>
        <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#0d0a00"/>
          <stop offset="25%" stop-color="#ffb300"/>
          <stop offset="75%" stop-color="#ff6a00"/>
          <stop offset="100%" stop-color="#0d0a00"/>
        </linearGradient>
        <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffb300" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffd000" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#ffd000" stop-opacity="0"/>
        </radialGradient>
        <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="nameGlow" x="-5%" y="-20%" width="110%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="clip"><rect width="900" height="280" rx="14"/></clipPath>
      </defs>

      <g clip-path="url(#clip)">

        <!-- BG -->
        <rect width="900" height="280" fill="url(#bg)"/>

        <!-- Grid -->
        <g stroke="#ffb300" stroke-width="0.4" opacity="0.07">
          <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
          <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
          <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
          <line x1="40" y1="0" x2="40" y2="280"/><line x1="80" y1="0" x2="80" y2="280"/>
          <line x1="120" y1="0" x2="120" y2="280"/><line x1="160" y1="0" x2="160" y2="280"/>
          <line x1="200" y1="0" x2="200" y2="280"/><line x1="240" y1="0" x2="240" y2="280"/>
          <line x1="280" y1="0" x2="280" y2="280"/><line x1="320" y1="0" x2="320" y2="280"/>
          <line x1="360" y1="0" x2="360" y2="280"/><line x1="400" y1="0" x2="400" y2="280"/>
          <line x1="440" y1="0" x2="440" y2="280"/><line x1="480" y1="0" x2="480" y2="280"/>
          <line x1="520" y1="0" x2="520" y2="280"/><line x1="560" y1="0" x2="560" y2="280"/>
          <line x1="600" y1="0" x2="600" y2="280"/><line x1="640" y1="0" x2="640" y2="280"/>
          <line x1="680" y1="0" x2="680" y2="280"/><line x1="720" y1="0" x2="720" y2="280"/>
          <line x1="760" y1="0" x2="760" y2="280"/><line x1="800" y1="0" x2="800" y2="280"/>
          <line x1="840" y1="0" x2="840" y2="280"/><line x1="880" y1="0" x2="880" y2="280"/>
        </g>

        <!-- Orbs -->
        <ellipse cx="0" cy="0" rx="200" ry="200" fill="url(#orb1)">
          <animate attributeName="rx" values="200;240;200" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="200;240;200" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="900" cy="280" rx="200" ry="200" fill="url(#orb2)">
          <animate attributeName="rx" values="200;240;200" dur="5s" begin="1.5s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="200;240;200" dur="5s" begin="1.5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="620" cy="60" rx="130" ry="130" fill="url(#orb3)">
          <animate attributeName="rx" values="130;160;130" dur="6s" begin="0.8s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="130;160;130" dur="6s" begin="0.8s" repeatCount="indefinite"/>
        </ellipse>

        <!-- Corner brackets -->
        <g stroke="#ffb300" stroke-width="2" fill="none" opacity="0.6">
          <polyline points="14,34 14,14 34,14"/>
          <polyline points="866,14 886,14 886,34"/>
          <polyline points="14,246 14,266 34,266"/>
          <polyline points="866,266 886,266 886,246"/>
        </g>

        <!-- SHIELD -->
        <g transform="translate(44,94)" filter="url(#shieldGlow)">
          <path d="M38 0 L4 13 V34 C4 52 18 67 38 72 C58 67 72 52 72 34 V13 Z"
                fill="rgba(255,179,0,0.09)" stroke="#ffb300" stroke-width="1.8"/>
          <path d="M38 9 L11 20 V35 C11 49 22 61 38 65 C54 61 65 49 65 35 V20 Z"
                fill="rgba(255,179,0,0.04)" stroke="rgba(255,179,0,0.28)" stroke-width="1"/>
          <circle cx="38" cy="40" r="11" fill="rgba(255,179,0,0.13)" stroke="#ffb300" stroke-width="1.6">
            <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
          </circle>
          <rect x="34" y="39" width="8" height="10" rx="1.5" fill="#ffb300"/>
          <path d="M33 39 V35 C33 31.5 35.2 29 38 29 C40.8 29 43 31.5 43 35 V39"
                stroke="#ffb300" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M38 0 L4 13 V34 C4 52 18 67 38 72 C58 67 72 52 72 34 V13 Z"
                fill="none" stroke="#ffb300" stroke-width="2">
            <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="stroke-width" values="2;6;2" dur="2.5s" repeatCount="indefinite"/>
          </path>
        </g>

        <!-- ACTIVE -->
        <circle cx="68" cy="195" r="4.5" fill="#ffb300">
          <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
        </circle>
        <text x="78" y="199" font-family="'Courier New',monospace" font-size="10.5"
              fill="#ffb300" letter-spacing="1.5">ACTIVE</text>

        <!-- TAGLINE -->
        <text x="155" y="92" font-family="'Courier New',monospace" font-size="11"
              fill="#ffb300" letter-spacing="3.5" opacity="0.85">// CYBERSECURITY · WEB DEV · CTF</text>

        <!-- NAME -->
        <text x="153" y="154" font-family="'Arial Black','Impact',sans-serif" font-size="56"
              font-weight="900" fill="url(#nameGrad)" filter="url(#nameGlow)" letter-spacing="-0.5">Hemanth Kumar B</text>

        <!-- PILLS -->
        <rect x="154" y="165" width="140" height="28" rx="14"
              fill="rgba(255,179,0,0.10)" stroke="rgba(255,179,0,0.45)" stroke-width="1"/>
        <text x="224" y="183" font-family="Arial,sans-serif" font-size="11.5"
              font-weight="700" fill="#ffb300" text-anchor="middle">🔐  Web Security</text>

        <rect x="304" y="165" width="126" height="28" rx="14"
              fill="rgba(255,106,0,0.14)" stroke="rgba(255,106,0,0.5)" stroke-width="1"/>
        <text x="367" y="183" font-family="Arial,sans-serif" font-size="11.5"
              font-weight="700" fill="#ff6a00" text-anchor="middle">🏁  CTF Hunter</text>

        <rect x="440" y="165" width="78" height="28" rx="14"
              fill="rgba(255,208,0,0.12)" stroke="rgba(255,208,0,0.45)" stroke-width="1"/>
        <text x="479" y="183" font-family="Arial,sans-serif" font-size="11.5"
              font-weight="700" fill="#ffd000" text-anchor="middle">💻  Dev</text>

        <!-- STATS -->
        <text x="184" y="222" font-family="'Arial Black',sans-serif" font-size="24"
              font-weight="900" fill="#ffb300" text-anchor="middle">6+</text>
        <text x="184" y="238" font-family="Arial,sans-serif" font-size="9.5"
              fill="rgba(255,255,255,0.38)" letter-spacing="1.5" text-anchor="middle">PODIUMS</text>

        <line x1="224" y1="208" x2="224" y2="246" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

        <text x="262" y="222" font-family="'Arial Black',sans-serif" font-size="24"
              font-weight="900" fill="#ffb300" text-anchor="middle">2×</text>
        <text x="262" y="238" font-family="Arial,sans-serif" font-size="9.5"
              fill="rgba(255,255,255,0.38)" letter-spacing="1.5" text-anchor="middle">🥇 GOLD</text>

        <line x1="302" y1="208" x2="302" y2="246" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

        <text x="350" y="222" font-family="'Arial Black',sans-serif" font-size="24"
              font-weight="900" fill="#ffb300" text-anchor="middle">3+</text>
        <text x="350" y="238" font-family="Arial,sans-serif" font-size="9.5"
              fill="rgba(255,255,255,0.38)" letter-spacing="1.5" text-anchor="middle">INTERNSHIPS</text>

        <line x1="396" y1="208" x2="396" y2="246" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

        <text x="435" y="222" font-family="'Arial Black',sans-serif" font-size="24"
              font-weight="900" fill="#ffb300" text-anchor="middle">CSE</text>
        <text x="435" y="238" font-family="Arial,sans-serif" font-size="9.5"
              fill="rgba(255,255,255,0.38)" letter-spacing="1.5" text-anchor="middle">CYBER SEC</text>

        <!-- TERMINAL -->
        <rect x="664" y="44" width="218" height="190" rx="9"
              fill="rgba(10,7,0,0.82)" stroke="rgba(255,179,0,0.25)" stroke-width="1"/>
        <rect x="664" y="44" width="218" height="30" rx="9" fill="rgba(255,179,0,0.07)"/>
        <rect x="664" y="62" width="218" height="12" fill="rgba(255,179,0,0.07)"/>
        <line x1="664" y1="74" x2="882" y2="74" stroke="rgba(255,179,0,0.18)" stroke-width="1"/>

        <circle cx="680" cy="59" r="5.5" fill="#ff5f57"/>
        <circle cx="696" cy="59" r="5.5" fill="#febc2e"/>
        <circle cx="712" cy="59" r="5.5" fill="#28c840"/>
        <text x="724" y="63" font-family="'Courier New',monospace" font-size="9"
              fill="rgba(255,255,255,0.32)" letter-spacing="1">terminal</text>

        <text x="676" y="97" font-family="'Courier New',monospace" font-size="10.5" fill="#ffb300">$ </text>
        <text x="691" y="97" font-family="'Courier New',monospace" font-size="10.5" fill="#e0e0e0">nmap -sV target</text>
        <text x="676" y="113" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.38)">Scanning...</text>
        <text x="676" y="129" font-family="'Courier New',monospace" font-size="10.5" fill="#28c840">PORT 443 OPEN ✓</text>
        <text x="676" y="150" font-family="'Courier New',monospace" font-size="10.5" fill="#ffb300">$ </text>
        <text x="691" y="150" font-family="'Courier New',monospace" font-size="10.5" fill="#e0e0e0">whoami</text>
        <text x="676" y="166" font-family="'Courier New',monospace" font-size="10.5" fill="#ff6a00">N1ghtM4r3d4rk</text>
        <text x="676" y="187" font-family="'Courier New',monospace" font-size="10.5" fill="#ffb300">$ </text>
        <text x="691" y="187" font-family="'Courier New',monospace" font-size="10.5" fill="#e0e0e0">cat flag.txt</text>
        <text x="676" y="205" font-family="'Courier New',monospace" font-size="10.5" fill="#28c840">flag{h3m4nth_w1ns}</text>

        <!-- Blinking cursor -->
        <rect x="676" y="213" width="7" height="12" fill="#ffb300" rx="1">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>

        <!-- PARTICLES -->
        <circle cx="190" cy="280" r="2" fill="#ffb300" opacity="0">
          <animate attributeName="cy" values="280;0" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.7;0.4;0" dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="330" cy="280" r="2" fill="#ff6a00" opacity="0">
          <animate attributeName="cy" values="280;0" dur="8s" begin="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.7;0.4;0" dur="8s" begin="1.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="490" cy="280" r="2" fill="#ffd000" opacity="0">
          <animate attributeName="cy" values="280;0" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.7;0.4;0" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="580" cy="280" r="1.5" fill="#ffb300" opacity="0">
          <animate attributeName="cy" values="280;0" dur="7s" begin="0.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.6;0.3;0" dur="7s" begin="0.6s" repeatCount="indefinite"/>
        </circle>

        <!-- Bottom accent line -->
        <rect x="0" y="276" width="900" height="4" fill="url(#accentLine)"/>

      </g>
    </svg>
  </div>
</body>
</html>
