    <line x1="665" y1="78" x2="883" y2="78" stroke="rgba(0,247,255,0.14)" stroke-width="1"/>

    <circle cx="682" cy="63" r="5" fill="#ff5f57"/>
    <circle cx="698" cy="63" r="5" fill="#febc2e"/>
    <circle cx="714" cy="63" r="5" fill="#28c840"/>
    <text x="726" y="67" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.32)" letter-spacing="1">terminal</text>

    <text x="678" y="101" font-family="'Courier New', monospace" font-size="10.5" fill="#00f7ff">$ </text>
    <text x="693" y="101" font-family="'Courier New', monospace" font-size="10.5" fill="#e8eaf0">nmap -sV target</text>

    <text x="678" y="117" font-family="'Courier New', monospace" font-size="9.5" fill="rgba(255,255,255,0.4)">Scanning...</text>

    <text x="678" y="133" font-family="'Courier New', monospace" font-size="10.5" fill="#28c840">PORT 443 OPEN ✓</text>

    <text x="678" y="153" font-family="'Courier New', monospace" font-size="10.5" fill="#00f7ff">$ </text>
    <text x="693" y="153" font-family="'Courier New', monospace" font-size="10.5" fill="#e8eaf0">whoami</text>

    <text x="678" y="169" font-family="'Courier New', monospace" font-size="10.5" fill="#a78bfa">N1ght_M4r3_d4rk</text>

    <text x="678" y="189" font-family="'Courier New', monospace" font-size="10.5" fill="#00f7ff">$ </text>
    <text x="693" y="189" font-family="'Courier New', monospace" font-size="10.5" fill="#e8eaf0">cat flag.txt</text>

    <text x="678" y="207" font-family="'Courier New', monospace" font-size="10.5" fill="#28c840">flag{h3m4nth_w1ns}</text>

    <rect x="678" y="215" width="7" height="12" fill="#00f7ff" rx="1">
